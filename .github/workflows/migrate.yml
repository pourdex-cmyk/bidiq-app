name: Run DB Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Apply Missing Migrations & Seed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install postgresql client
        run: sudo apt-get install -y postgresql-client

      - name: Run migrations and seed
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Try each known Supabase pooler region until one connects
          for HOST in \
            aws-0-us-east-1.pooler.supabase.com \
            aws-0-us-west-1.pooler.supabase.com \
            aws-0-eu-central-1.pooler.supabase.com \
            aws-0-ap-southeast-1.pooler.supabase.com; do
            echo "Trying $HOST..."
            if psql "postgresql://postgres.zzceddacoumhainuvwtr:${SUPABASE_DB_PASSWORD}@${HOST}:5432/postgres?sslmode=require" -c "SELECT 1" 2>/dev/null; then
              echo "Connected via $HOST"
              PGHOST=$HOST
              break
            fi
          done

          if [ -z "$PGHOST" ]; then
            echo "All pooler regions failed — trying direct host"
            PGHOST="db.zzceddacoumhainuvwtr.supabase.co"
            PGUSER="postgres"
          else
            PGUSER="postgres.zzceddacoumhainuvwtr"
          fi

          CONN="postgresql://${PGUSER}:${SUPABASE_DB_PASSWORD}@${PGHOST}:5432/postgres?sslmode=require"
          echo "Running migrations..."
          psql "$CONN" -f supabase/migrations/_combined.sql
          echo "Running seed..."
          psql "$CONN" -f supabase/seed/_phase2.sql
          echo "Done"
